<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>工程計算器（深色版）</title>

<style>
body {
  background:#0d0d0d;
  color:#fff;
  font-family:Arial;
  padding:20px;
}
.container {
  max-width:600px;
  margin:20px auto;
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
}
.row {display:flex; margin:10px 0;}
.row label {width:130px; text-align:right; padding-right:10px;}
.row input,.row select {
  flex:1; padding:8px; background:#262626; color:#fff;
  border:1px solid #555; border-radius:6px; text-align:center;
}
button {
  width:100%; padding:12px; margin-top:10px;
  background:#4da3ff; border:none; border-radius:8px;
}
.result,.result-box {
  margin-top:10px; padding:10px;
  background:#111; border-radius:8px;
}
</style>
</head>

<body>

<h1>工程計算器</h1>

<!-- 坪數 -->
<div class="container">
<h2>坪數計算</h2>
<div class="row"><label>長CM</label><input id="len" oninput="calcPing()"></div>
<div class="row"><label>寬CM</label><input id="wid" oninput="calcPing()"></div>
<div id="pingResult" class="result"></div>
</div>

<!-- 浪板 -->
<div class="container">
<h2>浪板</h2>
<div class="row"><label>類型</label>
<select id="slopeType" onchange="calcWave()">
<option value="1">單斜</option>
<option value="2">雙斜</option>
</select></div>
<div class="row"><label>長度CM</label><input id="roofLen" oninput="calcWave()"></div>
<div id="waveResult" class="result"></div>
</div>

<!-- 斜切 -->
<div class="container">
<h2>斜切</h2>
<div class="row"><label>分水</label><input id="fenShui"></div>
<div class="row"><label>料寬</label>
<select id="liaoKuan">
<option value="10">10</option>
<option value="12.5">12.5</option>
</select></div>
<div class="row"><label>底長</label><input id="bottom"></div>
<div class="row"><label>中脊高</label><input id="centerH" readonly></div>
<button onclick="calc()">計算</button>
<div id="result" class="result-box"></div>
</div>

<!-- C型鋼 -->
<div class="container">
<h2>C型鋼間距</h2>
<div class="row"><label>總長</label><input id="cLen" oninput="calcC()"></div>
<div class="row"><label>首隻</label><input id="firstGap" value="15" readonly></div>
<div id="cResult" class="result">請輸入資料</div>
</div>

<!-- 三角形 -->
<div class="container">
<h2>三角形</h2>
<div class="row"><label>A</label><input id="triA"></div>
<div class="row"><label>B</label><input id="triB"></div>
<button onclick="calcTri()">計算</button>
<div id="triResult" class="result-box"></div>
</div>

<!-- 樓梯 -->
<div class="container">
<h2>樓梯計算</h2>
<div class="row"><label>總高</label><input id="stairH"></div>
<div class="row"><label>水平長</label><input id="stairL"></div>
<div class="row"><label>步數</label><input id="stairN"></div>
<button onclick="calcStair()">計算</button>
<div id="stairResult" class="result-box"></div>
</div>

<script>

// 坪數
function calcPing(){
let L=len.value,W=wid.value;
if(!L||!W)return pingResult.innerHTML="";
let cm=L*W;
pingResult.innerHTML=`${(cm/33057.85).toFixed(2)}坪`;
}

// 浪板
function calcWave(){
let L=roofLen.value;
if(!L)return;
let pcs=Math.ceil(L/75);
if(slopeType.value==2)pcs*=2;
waveResult.innerHTML=`${pcs}片`;
}

// 斜切
function calc(){
let f=fenShui.value,w=liaoKuan.value,b=bottom.value;
if(!f||!w||!b)return;
let rad=Math.atan(f/10);
let h=b*Math.tan(rad);
centerH.value=h.toFixed(2);
let slope=Math.sqrt(b*b+h*h);
let delta=w*Math.tan(rad);
let cut=w/Math.cos(rad);
result.innerHTML=`斜長:${slope.toFixed(1)}<br>切:${delta.toFixed(1)}`;
}

// ⭐ C型鋼（完整修正版）
function calcC(){
let total=parseFloat(cLen.value);
let first=parseFloat(firstGap.value);

if(!total||total<=first){
cResult.innerHTML="無解";
return;
}

let usable=total-first;
let edge=2;

let normal=[];
let under60=[];
let txt="";

for(let n=2;n<100;n++){
let space=usable/(n-1);

// 60~80 正常
if(space>=60 && space<=80){
normal.push({n,space});
}

// <60（只允許 <200）
if(total<200 && space<60){
under60.push({n,space});
}

// >=200 禁止
if(total>=200 && space<60)break;

// 極限保護
if(space<30)break;
}

txt+=`🔧 計算過程：<br>`;
txt+=`總長 ${total} - 首隻 ${first} = ${usable} cm<br>`;
txt+=`封邊骨架 +${edge} 隻<br><br>`;

// 正常方案
if(normal.length>0){
txt+=`✅ 60～80 cm 標準方案：<br>`;
normal.forEach(v=>{
txt+=`間距 ${v.space.toFixed(1)} cm → C型鋼 ${v.n} + 封邊2 = ${v.n+edge} 隻<br>`;
});
txt+=`<br>`;
}

// 小於60方案
if(total<200 && under60.length>0){
txt+=`⚠️ 小於60 cm 可行方案：<br>`;
under60.forEach(v=>{
txt+=`間距 ${v.space.toFixed(1)} cm → C型鋼 ${v.n} + 封邊2 = ${v.n+edge} 隻<br>`;
});
}

// 無解
if(normal.length===0 && under60.length===0){
txt="無解";
}

cResult.innerHTML=txt;
}

// 三角形
function calcTri(){
let A=triA.value,B=triB.value;
if(!A||!B)return;
triResult.innerHTML=Math.sqrt(A*A+B*B).toFixed(2);
}

// 樓梯
function calcStair(){
let h=stairH.value,l=stairL.value,n=stairN.value;
if(!h||!l||!n)return;
let stepH=h/n;
let stepW=l/n;
let slope=Math.sqrt(h*h+l*l);
stairResult.innerHTML=
`斜邊:${slope.toFixed(1)}<br>
每階高:${stepH.toFixed(1)}<br>
每階寬:${stepW.toFixed(1)}`;
}

</script>

</body>
</html>
