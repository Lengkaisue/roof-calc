<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>工程計算器（穩定版）</title>

<style>
body {background:#0d0d0d;color:#fff;font-family:Arial;padding:20px;}
.container {max-width:600px;margin:20px auto;background:#1a1a1a;padding:20px;border-radius:12px;}
.row {display:flex;margin:10px 0;}
.row label {width:130px;text-align:right;padding-right:10px;align-self:center;}
/* 字體設定 16px 可防止 iPhone 自動放大畫面 */
.row input,.row select {
flex:1;padding:8px;background:#262626;color:#fff;
border:1px solid #555;border-radius:6px;text-align:center;font-size:16px;}
/* 隱藏數字輸入框的上下箭頭 */
input[type=number]::-webkit-inner-spin-button, 
input[type=number]::-webkit-outer-spin-button {-webkit-appearance: none; margin: 0;}
button {width:100%;padding:12px;margin-top:10px;background:#4da3ff;border:none;border-radius:8px;font-size:16px;font-weight:bold;}
.result,.result-box {margin-top:10px;padding:10px;background:#111;border-radius:8px;min-height:24px;}
</style>
</head>

<body>

<h1>工程計算器</h1>

<div class="container">
<h2>坪數計算</h2>
<div class="row"><label>長CM</label><input type="number" inputmode="decimal" id="len" oninput="calcPing()"></div>
<div class="row"><label>寬CM</label><input type="number" inputmode="decimal" id="wid" oninput="calcPing()"></div>
<div id="pingResult" class="result"></div>
</div>

<div class="container">
<h2>浪板</h2>
<div class="row"><label>類型</label>
<select id="slopeType" onchange="calcWave()">
<option value="1">單斜</option>
<option value="2">雙斜</option>
</select></div>
<div class="row"><label>長度CM</label><input type="number" inputmode="decimal" id="roofLen" oninput="calcWave()"></div>
<div id="waveResult" class="result"></div>
</div>

<div class="container">
<h2>斜切</h2>
<div class="row"><label>分水</label><input type="number" inputmode="decimal" id="fenShui"></div>
<div class="row"><label>料寬</label>
<select id="liaoKuan">
<option value="10">10</option>
<option value="12.5">12.5</option>
</select></div>
<div class="row"><label>底長</label><input type="number" inputmode="decimal" id="bottom"></div>
<div class="row"><label>中脊高</label><input type="number" id="centerH" readonly></div>
<button onclick="calc()">計算</button>
<div id="result" class="result-box"></div>
</div>

<div class="container">
<h2>C型鋼間距</h2>
<div class="row"><label>總長</label><input type="number" inputmode="decimal" id="cLen" oninput="calcC()"></div>
<div class="row"><label>首隻</label><input type="number" inputmode="decimal" id="firstGap" value="15" readonly></div>
<div id="cResult" class="result"></div>
</div>

<div class="container">
<h2>三角形</h2>
<div class="row"><label>A</label><input type="number" inputmode="decimal" id="triA"></div>
<div class="row"><label>B</label><input type="number" inputmode="decimal" id="triB"></div>
<button onclick="calcTri()">計算</button>
<div id="triResult" class="result-box"></div>
</div>

<div class="container">
<h2>樓梯計算</h2>
<div class="row"><label>總高</label><input type="number" inputmode="decimal" id="stairH"></div>
<div class="row"><label>水平長</label><input type="number" inputmode="decimal" id="stairL"></div>
<div class="row"><label>料寬</label><input type="number" inputmode="decimal" id="matW"></div>
<button onclick="calcStair()">計算</button>
<div id="stairResult" class="result-box"></div>
</div>

<script>
// 坪數
function calcPing(){
let L=parseFloat(document.getElementById('len').value);
let W=parseFloat(document.getElementById('wid').value);
let result=document.getElementById('pingResult');

if(isNaN(L)||isNaN(W)){result.innerHTML="";return;}
result.innerHTML=`${(L*W/33057.85).toFixed(2)}坪`;
}

// 浪板
function calcWave(){
let L=parseFloat(document.getElementById('roofLen').value);
let type=document.getElementById('slopeType').value;
let result=document.getElementById('waveResult');

if(isNaN(L)){result.innerHTML="";return;}

let pcs=Math.ceil(L/75);
if(type==2)pcs*=2;
result.innerHTML=`${pcs}片`;
}

// 斜切
function calc(){
let f=parseFloat(document.getElementById('fenShui').value);
let w=parseFloat(document.getElementById('liaoKuan').value);
let b=parseFloat(document.getElementById('bottom').value);
let result=document.getElementById('result');

if(isNaN(f)||isNaN(w)||isNaN(b)){result.innerHTML="請輸入資料";return;}

let rad=Math.atan(f/10);
let h=b*Math.tan(rad);
document.getElementById('centerH').value=h.toFixed(2);

let slope=Math.sqrt(b*b+h*h);
let delta=w*Math.tan(rad);

result.innerHTML=`斜長:${slope.toFixed(1)}<br>切:${delta.toFixed(1)}`;
}

// C型鋼 (已修正手機版 ID 抓取方式，並刪除多餘的舊代碼)
function calcC() {
  let total = parseFloat(document.getElementById('cLen').value);
  let first = parseFloat(document.getElementById('firstGap').value);
  let cResult = document.getElementById('cResult');

  if (!total || total <= first) {
    cResult.innerHTML = "無解";
    return;
  }

  let usable = total - first;
  let edge = 2;
  let txt = `總長 ${total} - 首隻 ${first} = ${usable} cm<br><br>`;
  let hasResult = false;

  for (let n = 2; n < 100; n++) {
    let space = usable / (n - 1);

    if (usable <= 200) {
      // 兩米以下：列出所有 50 ~ 80 之間的結果
      if (space >= 50 && space <= 80) {
        txt += `C型鋼 ${n}隻→間距 (${space.toFixed(1)} cm )外 + 封邊骨架2隻 = ${n + edge} 隻<br>`;
        hasResult = true;
      }
      if (space < 50) break; 
    } else {
      // 超過兩米：列出所有 60 ~ 80 之間的結果
      if (space >= 60 && space <= 80) {
        txt += `C型鋼 ${n}隻→間距 (${space.toFixed(1)} cm )外 + 封邊骨架2隻 = ${n + edge} 隻<br>`;
        hasResult = true;
      }
      if (space < 60) break;
    }
  }

  if (!hasResult) {
    txt += `無解<br>`;
  }

  cResult.innerHTML = txt;
}

// 三角形
function calcTri(){
let A=parseFloat(document.getElementById('triA').value);
let B=parseFloat(document.getElementById('triB').value);
let result=document.getElementById('triResult');

if(isNaN(A)||isNaN(B)){result.innerHTML="";return;}

result.innerHTML=Math.sqrt(A*A+B*B).toFixed(2);
}

// 樓梯（穩定完整版）
function calcStair(){
let H=parseFloat(document.getElementById('stairH').value);
let L=parseFloat(document.getElementById('stairL').value);
let W=parseFloat(document.getElementById('matW').value);
let result=document.getElementById('stairResult');

if(isNaN(H)||isNaN(L)||isNaN(W)){
result.innerHTML="請輸入高度、水平長、料寬";
return;
}

let slope=Math.sqrt(H*H+L*L);
let txt="📊 可行方案（工地模式）<br><br>";
let found=false;

for(let N=10; N<=25; N++){
let stepH=H/N;
let stepW=L/N;
let stepSlope=slope/N;

if(stepH<=23 && stepW>=20){
found=true;

let status="";
if(stepH>=16 && stepH<=18){
status="🟢標準";
}else if(stepH<=20){
status="🟡可用";
}else{
status="🔴極限";
}

let cutTop=W*(H/L);
let cutBottom=W*(L/H);

txt+=
`步數：${N} 踏<br>
每階高：${stepH.toFixed(1)} cm<br>
每階深：${stepW.toFixed(1)} cm<br>
每步斜長：${stepSlope.toFixed(1)} cm<br>
上切：${cutTop.toFixed(1)} cm｜下切：${cutBottom.toFixed(1)} cm<br>
狀態：${status}
<hr>`;
}
}

if(!found){
txt="⚠️ 無符合條件方案（空間太小，建議調整總高或水平長度）";
}

result.innerHTML=txt;
}
</script>
</body>
</html>
