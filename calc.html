<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>工程計算器（深色版）</title>
<style>
  body {
    background: #0d0d0d;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 20px;
    margin: 0;
  }
  h1, h2 {
    color: #4da3ff;
    text-align: center;
    margin-bottom: 20px;
  }
  .container {
    max-width: 600px;
    margin: 20px auto;
    background: #1a1a1a;
    padding: 25px;
    border-radius: 14px;
    box-shadow: 0 0 15px #222;
  }
  .row {
    display: flex;
    align-items: center;
    margin-bottom: 12px;
  }
  .row label {
    width: 130px;
    text-align: right;
    padding-right: 10px;
    font-size: 15px;
  }
  .row input,
  .row select {
    flex: 1;
    padding: 10px;
    font-size: 16px;
    background: #262626;
    color: #fff;
    border: 1px solid #555;
    border-radius: 8px;
    text-align: center;
    outline: none;
  }
  button {
    width: 100%;
    padding: 14px;
    margin-top: 15px;
    background: #4da3ff;
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
  }
  .result, .result-box {
    margin-top: 15px;
    background: #121212;
    color: #4da3ff;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #333;
    font-size: 18px;
    font-weight: bold;
    min-height: 40px;
    white-space: pre-line;
  }
</style>
</head>
<body>

<h1>工程計算器（深色版）</h1>

<!-- 坪數 -->
<div class="container">
  <h2>坪數計算</h2>
  <div class="row">
    <label>長 (cm)</label>
    <input type="number" id="len" oninput="calcPing()">
  </div>
  <div class="row">
    <label>寬 (cm)</label>
    <input type="number" id="wid" oninput="calcPing()">
  </div>
  <div id="pingResult" class="result">請輸入長寬</div>
</div>

<!-- 浪板 -->
<div class="container">
  <h2>浪板片數計算（750型）</h2>
  <div class="row">
    <label>屋頂類型</label>
    <select id="slopeType" onchange="calcWave()">
      <option value="1">單斜</option>
      <option value="2">雙斜（自動 ×2）</option>
    </select>
  </div>
  <div class="row">
    <label>單邊屋頂長度 (cm)</label>
    <input type="number" id="roofLen" oninput="calcWave()">
  </div>
  <div id="waveResult" class="result">請輸入資料</div>
</div>

<!-- 斜切 -->
<div class="container">
  <h2>斜切計算器</h2>
  <div class="row">
    <label>分水</label>
    <input type="number" id="fenShui">
  </div>
  <div class="row">
    <label>料寬</label>
    <select id="liaoKuan">
      <option value="10">10 cm</option>
      <option value="12.5" selected>12.5 cm</option>
    </select>
  </div>
  <div class="row">
    <label>底長 (cm)</label>
    <input type="number" id="bottom">
  </div>
  <div class="row">
    <label>中心高</label>
    <input type="number" id="centerH" readonly>
  </div>
  <button onclick="calc()">計算</button>
  <div id="result" class="result-box"></div>
</div>

<!-- C型鋼 -->
<div class="container">
  <h2>C 型鋼間距計算（含封邊）</h2>
  <div class="row">
    <label>斜樑總長 (cm)</label>
    <input type="number" id="cLen" oninput="calcC()">
  </div>
  <div class="row">
    <label>首隻間距</label>
    <input type="number" value="15" readonly>
  </div>
  <div id="cResult" class="result">請輸入資料</div>
</div>

<!-- 三角形 -->
<div class="container">
  <h2>三角形斜邊計算器（畢氏定理）</h2>
  <div class="row">
    <label>邊長A (cm)</label>
    <input type="number" id="triA">
  </div>
  <div class="row">
    <label>邊長B (cm)</label>
    <input type="number" id="triB">
  </div>
  <button onclick="calcTri()">計算斜邊</button>
  <div id="triResult" class="result-box"></div>
</div>

<script>

// 坪數
function calcPing() {
  let L = parseFloat(document.getElementById('len').value);
  let W = parseFloat(document.getElementById('wid').value);
  if (isNaN(L) || isNaN(W)) {
    pingResult.innerHTML = "請輸入長寬";
    return;
  }
  let cm2 = L * W;
  pingResult.innerHTML = `約 ${(cm2/33057.85).toFixed(2)} 坪（${(cm2/10000).toFixed(2)} m²）`;
}

// 浪板
function calcWave() {
  let type = Number(document.getElementById('slopeType').value);
  let L = parseFloat(document.getElementById('roofLen').value);
  if (isNaN(L)) {
    waveResult.innerHTML = "請輸入資料";
    return;
  }
  let pcs = Math.ceil(L / 75);
  if (type === 2) pcs *= 2;
  waveResult.innerHTML = `需要浪板：${pcs} 片`;
}

// 斜切
function calc() {
  const f = parseFloat(fenShui.value);
  const w = parseFloat(liaoKuan.value);
  const b = parseFloat(bottom.value);

  if (isNaN(f) || isNaN(w) || isNaN(b)) return;

  const rad = Math.atan(f / 10);
  const h = b * Math.tan(rad);
  centerH.value = h.toFixed(2);

  const slope = Math.sqrt(b*b + h*h);
  const delta = w * Math.tan(rad);
  const cut = w / Math.cos(rad);

  result.innerHTML =
    `角度：${(rad*180/Math.PI).toFixed(2)}°<br>
     高度：${h.toFixed(2)} cm<br>
     斜長：${slope.toFixed(2)} cm<br>
     切量：${delta.toFixed(2)} cm<br>
     斜切長：${cut.toFixed(2)} cm`;
}

// ⭐ C型鋼（含封邊+2）
function calcC() {
  let total = parseFloat(cLen.value);
  let first = 15;

  if (isNaN(total) || total <= first) {
    cResult.innerHTML = "請輸入有效長度";
    return;
  }

  let usable = total - first;

  // 短距離
  if (total < 200) {
    let best = usable;
    let bestN = 2;

    for (let n = 2; n < 50; n++) {
      let space = usable / (n - 1);
      if (space < best) {
        best = space;
        bestN = n;
      }
    }

    let finalN = bestN + 2;

    cResult.innerHTML =
      `短距離模式<br>
       間距：約 ${best.toFixed(1)} cm<br>
       原本：${bestN} 隻 → 含封邊：${finalN} 隻`;
    return;
  }

  // 正常
  let txt = "";
  let found = false;

  for (let n = 2; n < 50; n++) {
    let space = usable / (n - 1);

    if (space >= 60 && space <= 80) {
      found = true;
      let finalN = n + 2;
      txt += `${space.toFixed(1)} cm（${n}隻 → ${finalN}隻）<br>`;
    }
  }

  cResult.innerHTML = found ? txt : "沒有符合 60～80";
}

// 三角形
function calcTri() {
  let A = parseFloat(triA.value);
  let B = parseFloat(triB.value);

  if (isNaN(A) || isNaN(B) || A <= 0 || B <= 0) {
    triResult.innerHTML = "請輸入有效數值";
    return;
  }

  let C = Math.sqrt(A*A + B*B);
  triResult.innerHTML = `斜邊長度：${C.toFixed(2)} cm`;
}

</script>

</body>
</html>
